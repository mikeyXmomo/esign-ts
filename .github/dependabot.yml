version: 2

updates:
  # Enable version updates for npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 10
    reviewers:
      - "mikeyxmomo"
    assignees:
      - "mikeyxmomo"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
      include: "scope"
    labels:
      - "dependencies"
      - "automated"
    groups:
      # Group TypeScript and related tools
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
          - "tsdown"
      # Group testing tools
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
      # Group linting tools
      linting:
        patterns:
          - "eslint"
          - "@typescript-eslint/*"
          - "prettier"
      # Group build tools
      build:
        patterns:
          - "bumpp"
          - "tsdown"

  # Enable version updates for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    reviewers:
      - "mikeyxmomo"
    assignees:
      - "mikeyxmomo"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "github-actions"
      - "automated"
