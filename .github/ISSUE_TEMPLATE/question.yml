name: ❓ Question
description: Ask a question about usage or implementation
title: "[Question]: "
labels: ["question", "needs-response"]
assignees:
  - mikeyxmomo

body:
  - type: markdown
    attributes:
      value: |
        Have a question about how to use esign-ts? We're here to help!

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
      placeholder: Ask your question here...
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: Provide any relevant context about what you're trying to achieve.
      placeholder: What are you trying to do? What's your use case?

  - type: textarea
    id: attempted
    attributes:
      label: What You've Tried
      description: What have you already tried?
      placeholder: Show any code you've tried or approaches you've attempted...

  - type: textarea
    id: code
    attributes:
      label: Code Sample
      description: Share relevant code if applicable
      render: typescript
      placeholder: |
        // Your current code
        import { EsignClient } from 'esign-ts';
        
        const client = new EsignClient({...});

  - type: input
    id: version
    attributes:
      label: esign-ts Version
      description: What version are you using?
      placeholder: e.g., 1.0.0

  - type: dropdown
    id: category
    attributes:
      label: Question Category
      description: What category does your question fall into?
      options:
        - API Usage
        - Configuration
        - TypeScript Types
        - Error Handling
        - Performance
        - Integration
        - Best Practices
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have read the README and API documentation
          required: true
        - label: I have searched existing issues and discussions
          required: true
        - label: I have provided sufficient context for my question
          required: true
